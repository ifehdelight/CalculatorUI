<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator UI</title>
  <link rel="stylesheet" href="style.css">
</head>
  
<body>
  <div class="container">
    <div class="screen-display">
      <p class="display">20+4</p>
    </div>
    <div class="buttons">
      <button class="button operator">AC</button>
      <button class="button operator">✖️</button>
      <button class="button operator">%</button>
      <button class="button operator">÷</button>
      <button class="button">7</button>
      <button class="button">8</button>
      <button class="button">9</button>
      <button class="button operator">×</button>
      <button class="button">4</button>
      <button class="button">5</button>
      <button class="button">6</button>
      <button class="button operator">-</button>
      <button class="button">1</button>
      <button class="button">2</button>
      <button class="button">3</button>
      <button class="button operator">+</button>
      <button class="button opertor">C</button>
      <button class="button">0</button>
      <button class="button">.</button>
      <button class="button" style="background-color: darkorange;">=</button>
    </div>
  </div>
  <script src="script.js">s
  </script>
</body>

</html>
